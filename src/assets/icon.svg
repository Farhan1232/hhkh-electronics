<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173d2c"/>
      <stop offset="0.55" stop-color="#0e271d"/>
      <stop offset="1" stop-color="#07160f"/>
    </linearGradient>
    <linearGradient id="mark" x1="140" y1="120" x2="372" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5cf3ab"/>
      <stop offset="0.55" stop-color="#1ec27a"/>
      <stop offset="1" stop-color="#10a366"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.52">
      <stop offset="0" stop-color="#1ec27a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#1ec27a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shine" cx="0.3" cy="0.2" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- greenish-black tile -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#tile)"/>
  <rect x="40" y="40" width="432" height="432" rx="96" fill="none" stroke="#1ec27a" stroke-opacity="0.20" stroke-width="3"/>
  <circle cx="256" cy="214" r="156" fill="url(#glow)"/>

  <!-- headphones (audio-electronics mark) -->
  <g transform="translate(116,80) scale(11.7)" fill="none" stroke="url(#mark)"
     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/>
  </g>

  <!-- soundwave / equalizer in the centre -->
  <g fill="#5cf3ab">
    <rect x="220" y="208" width="12" height="40" rx="6"/>
    <rect x="240" y="190" width="12" height="76" rx="6"/>
    <rect x="260" y="176" width="12" height="104" rx="6"/>
    <rect x="280" y="198" width="12" height="60" rx="6"/>
  </g>

  <!-- brand wordmark -->
  <text x="256" y="430" text-anchor="middle"
        font-family="'Poppins','Segoe UI',Arial,sans-serif"
        font-size="116" font-weight="800" letter-spacing="2"
        fill="url(#mark)">hhkh</text>

  <!-- gloss -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#shine)"/>
</svg>
